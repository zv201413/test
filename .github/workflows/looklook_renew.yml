name: LookLook 自动签到
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        shell: bash
        env:
          ALL_SECRETS: ${{ toJson(secrets) }}
        run: |
          COUNT=$(echo "$ALL_SECRETS" | jq -r 'keys[] | select(startswith("EML_"))' | sed 's/EML_//' | sort -n | jq -R . | jq -s -c .)
          if [ "$COUNT" = "[]" ] || [ -z "$COUNT" ]; then exit 1; fi
          echo "matrix=$COUNT" >> $GITHUB_OUTPUT

  renew:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        account_index: ${{ fromJson(needs.setup.outputs.matrix) }}
    
    steps:
      - name: 下载代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 启动代理 (可选 - sing-box)
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$PROXY_URL" ]; then exit 0; fi
          SINGBOX_VER="1.11.0"
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          mv "sing-box-${SINGBOX_VER}-linux-amd64/sing-box" ./sing-box
          chmod +x ./sing-box
          python proxy_handler.py
          nohup ./sing-box run -c config.json > singbox.log 2>&1 &
          sleep 3
          echo "PROXY_URL=$PROXY_URL" >> $GITHUB_ENV

      - name: 安装环境依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool fonts-noto-cjk
          pip install -r requirements.txt
          seleniumbase install chromedriver

      - name: 🚀 运行签到脚本
        env:
          ACC: ${{ secrets[format('EML_{0}', matrix.account_index)] }}
          ACC_PWD: ${{ secrets[format('PWD_{0}', matrix.account_index)] }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
          PROXY_URL: ${{ env.PROXY_URL }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python looklook_renew.py

      - name: 上传错误截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-acc-${{ matrix.account_index }}
          path: "*.png"
